<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>KPI Flashcards — NXS & OLTRE Società Benefit</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#182430;--bg2:#1E2F3F;--card:#243342;--card2:#2A3D50;--nxs:#2E9E7A;--oltre:#E8B84B;--green:#4CAF82;--white:#FFFFFF;--light:#D5E5D8;--muted:#7A9A8A;--red:#E05555;--orange:#E8943A;--purple:#9B72CF;--blue:#4A8FD4;--gray:#6B7E8A}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--white);min-height:100vh}
/* HEADER */
.header{position:sticky;top:0;z-index:100;background:var(--bg2);border-bottom:1px solid #2a3d50;padding:12px 20px;display:flex;flex-wrap:wrap;gap:10px;align-items:center}
.logo{font-size:16px;font-weight:700;color:var(--green);white-space:nowrap;margin-right:8px}
.logo span{color:var(--muted);font-weight:400;font-size:12px}
.controls{display:flex;flex-wrap:wrap;gap:8px;flex:1;align-items:center}
.search-wrap{position:relative;flex:1;min-width:200px;max-width:320px}
.search-wrap input{width:100%;background:#1a2d3e;border:1px solid #3a5060;border-radius:8px;padding:7px 12px 7px 32px;color:var(--white);font-size:13px;outline:none}
.search-wrap input::placeholder{color:var(--muted)}
.search-wrap::before{content:"🔍";position:absolute;left:10px;top:50%;transform:translateY(-50%);font-size:12px}
.filter-group{display:flex;gap:4px;flex-wrap:wrap}
.btn{border:none;cursor:pointer;border-radius:6px;font-size:12px;font-weight:600;padding:6px 12px;transition:all .2s;font-family:'Inter',sans-serif}
.btn-filter{background:#1a2d3e;color:var(--muted);border:1px solid #3a5060}
.btn-filter:hover,.btn-filter.active{background:var(--green);color:var(--bg);border-color:var(--green)}
.btn-filter.active-nxs{background:var(--nxs)!important;color:var(--white)!important;border-color:var(--nxs)!important}
.btn-filter.active-oltre{background:var(--oltre)!important;color:var(--bg)!important;border-color:var(--oltre)!important}
.btn-action{background:var(--card2);color:var(--light);border:1px solid #3a5060}
.btn-action:hover{background:#354d62;color:var(--white)}
.count-badge{background:var(--card2);border:1px solid #3a5060;border-radius:6px;padding:5px 12px;font-size:12px;color:var(--muted);white-space:nowrap}
.count-badge strong{color:var(--white)}
/* GRID */
.grid-container{padding:20px;max-width:1400px;margin:0 auto}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:16px}
/* CARDS */
.card-wrap{perspective:1000px;height:260px;cursor:pointer}
.card-wrap.hidden{display:none}
.card-inner{position:relative;width:100%;height:100%;transition:transform .55s cubic-bezier(.4,0,.2,1);transform-style:preserve-3d}
.card-wrap.flipped .card-inner{transform:rotateY(180deg)}
.card-face{position:absolute;width:100%;height:100%;backface-visibility:hidden;border-radius:12px;padding:16px;display:flex;flex-direction:column;gap:8px;overflow:hidden}
.card-front{background:var(--card);border:1px solid #2a3d50;box-shadow:0 4px 20px rgba(0,0,0,.3)}
.card-back{background:var(--card2);border:1px solid #2a3d50;transform:rotateY(180deg);overflow-y:auto}
/* Company accent bar */
.card-front::before{content:'';position:absolute;top:0;left:0;width:4px;height:100%;border-radius:12px 0 0 12px}
.card-front.nxs::before{background:var(--nxs)}
.card-front.oltre::before{background:var(--oltre)}
/* Badges row */
.badges{display:flex;gap:6px;flex-wrap:wrap;align-items:center}
.badge{font-size:10px;font-weight:600;padding:2px 8px;border-radius:20px;white-space:nowrap}
.badge-nxs{background:rgba(46,158,122,.2);color:var(--nxs)}
.badge-oltre{background:rgba(232,184,75,.2);color:var(--oltre)}
.badge-output{background:rgba(74,143,212,.2);color:var(--blue)}
.badge-outcome{background:rgba(46,158,122,.2);color:var(--nxs)}
.badge-impact{background:rgba(155,114,207,.2);color:var(--purple)}
.badge-governance{background:rgba(107,126,138,.2);color:var(--gray)}
.badge-area{background:rgba(76,175,130,.15);color:var(--green)}
/* Priority badges */
.badge-alta{background:rgba(224,85,85,.2);color:var(--red)}
.badge-media{background:rgba(232,148,58,.2);color:var(--orange)}
.badge-bassa{background:rgba(107,126,138,.2);color:var(--gray)}
/* KPI name */
.kpi-name{font-size:15px;font-weight:700;color:var(--white);line-height:1.3;flex:1}
.kpi-finalita{font-size:11px;color:var(--muted);margin-top:auto;border-top:1px solid #2a3d50;padding-top:8px;line-height:1.4}
.kpi-finalita strong{color:var(--light)}
/* Flip hint */
.flip-hint{font-size:10px;color:var(--muted);text-align:center;display:flex;align-items:center;gap:4px;justify-content:center}
/* BACK */
.back-title{font-size:13px;font-weight:700;color:var(--white);padding-bottom:8px;border-bottom:1px solid #354d62}
.back-row{display:flex;flex-direction:column;gap:2px;padding:5px 0;border-bottom:1px solid #2a3d50}
.back-row:last-child{border-bottom:none}
.back-label{font-size:10px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.5px}
.back-val{font-size:12px;color:var(--light)}
.targets{display:flex;gap:8px;margin-top:4px}
.target-box{flex:1;background:rgba(76,175,130,.1);border:1px solid rgba(76,175,130,.3);border-radius:6px;padding:5px 8px;text-align:center}
.target-box .t-label{font-size:9px;color:var(--muted);font-weight:600}
.target-box .t-val{font-size:13px;font-weight:700;color:var(--green)}
/* Empty state */
.empty{display:none;text-align:center;padding:60px 20px;color:var(--muted);grid-column:1/-1}
.empty.show{display:block}
/* Separator */
.section-sep{grid-column:1/-1;display:flex;align-items:center;gap:12px;margin:8px 0}
.section-sep .sep-label{font-size:13px;font-weight:700;padding:6px 14px;border-radius:20px;white-space:nowrap}
.section-sep .sep-line{flex:1;height:1px;background:#2a3d50}
/* Print */
@media print{
  .header{display:none}
  body{background:white;color:#111}
  .grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;padding:0}
  .card-wrap{height:auto;page-break-inside:avoid}
  .card-inner{transform:none!important}
  .card-front{position:relative;backface-visibility:visible;background:#f8f9fa;border:1px solid #ccc;color:#111}
  .card-back{display:none}
  .flip-hint{display:none}
  .kpi-name{color:#111}
  .kpi-finalita{color:#555}
  .badge-nxs,.badge-oltre{color:#111}
}
@media(max-width:600px){
  .grid{grid-template-columns:1fr}
  .header{padding:10px}
}
</style>
</head>
<body>

<div class="header">
  <div class="logo">KPI Flashcards <span>Società Benefit</span></div>
  <div class="controls">
    <div class="search-wrap">
      <input type="text" id="searchInput" placeholder="Cerca KPI..." oninput="applyFilters()">
    </div>
    <div class="filter-group" id="companyFilters">
      <button class="btn btn-filter active" data-company="all" onclick="setCompany(this,'all')">Tutte</button>
      <button class="btn btn-filter" data-company="NXS" onclick="setCompany(this,'NXS')" style="--ac:var(--nxs)">NXS SRL</button>
      <button class="btn btn-filter" data-company="OLTRE" onclick="setCompany(this,'OLTRE')" style="--ac:var(--oltre)">OLTRE SRL</button>
    </div>
    <div class="filter-group" id="areaFilters">
      <button class="btn btn-filter active" data-area="all" onclick="setArea(this,'all')">Tutte le Aree</button>
      <button class="btn btn-filter" data-area="Governance" onclick="setArea(this,'Governance')">Governance</button>
      <button class="btn btn-filter" data-area="Lavoratori" onclick="setArea(this,'Lavoratori')">Lavoratori</button>
      <button class="btn btn-filter" data-area="Comunità" onclick="setArea(this,'Comunità')">Comunità</button>
      <button class="btn btn-filter" data-area="Ambiente" onclick="setArea(this,'Ambiente')">Ambiente</button>
    </div>
    <div class="filter-group">
      <button class="btn btn-action" onclick="shuffleCards()">🔀 Mescola</button>
      <button class="btn btn-action" onclick="window.print()">🖨 Stampa</button>
    </div>
    <div class="count-badge"><strong id="shownCount">0</strong> / <strong id="totalCount">0</strong> KPI</div>
  </div>
</div>

<div class="grid-container">
  <div class="grid" id="cardGrid">
    <div class="empty" id="emptyState">Nessun KPI trovato con questi filtri.</div>
  </div>
</div>

let activeCompany = 'all';
let activeArea = 'all';
let currentData = [...KPI_DATA];

function tipoBadgeClass(tipo){
  if(tipo==='Impact') return 'badge-impact';
  if(tipo==='Outcome') return 'badge-outcome';
  if(tipo==='Output') return 'badge-output';
  return 'badge-governance';
}
function prioClass(p){return p==='Alta'?'badge-alta':p==='Media'?'badge-media':'badge-bassa';}

function buildCards(data){
  const grid = document.getElementById('cardGrid');
  const empty = document.getElementById('emptyState');
  // Remove all cards but keep empty div
  Array.from(grid.querySelectorAll('.card-wrap,.section-sep')).forEach(el=>el.remove());
  if(data.length===0){empty.classList.add('show');document.getElementById('shownCount').textContent='0';return;}
  empty.classList.remove('show');

  let lastCompany='';
  data.forEach(k=>{
    if(k.company!==lastCompany){
      const sep=document.createElement('div');
      sep.className='section-sep';
      const col=k.company==='NXS'?'var(--nxs)':'var(--oltre)';
      sep.innerHTML=`<div class="sep-line"></div><div class="sep-label" style="background:${col};color:${k.company==='NXS'?'#fff':'#182430'}">${k.company} SRL</div><div class="sep-line"></div>`;
      grid.insertBefore(sep,empty);
      lastCompany=k.company;
    }
    const wrap=document.createElement('div');
    wrap.className='card-wrap';
    wrap.dataset.company=k.company;
    wrap.dataset.area=k.area;
    wrap.dataset.search=(k.nome+' '+k.desc+' '+k.finalitaDesc).toLowerCase();
    wrap.onclick=()=>wrap.classList.toggle('flipped');
    const companyBadge=k.company==='NXS'?'badge-nxs':'badge-oltre';
    wrap.innerHTML=`
      <div class="card-inner">
        <div class="card-face card-front ${k.company.toLowerCase()}">
          <div class="badges">
            <span class="badge ${companyBadge}">${k.company} SRL</span>
            <span class="badge badge-area">${k.area}</span>
            <span class="badge ${tipoBadgeClass(k.tipo)}">${k.tipo}</span>
            <span class="badge ${prioClass(k.priorita)}">${k.priorita}</span>
          </div>
          <div class="kpi-name">${k.nome}</div>
          <div class="kpi-finalita"><strong>Finalità ${k.finalita}:</strong> ${k.finalitaDesc}</div>
          <div class="flip-hint">👆 clicca per vedere i dettagli</div>
        </div>
        <div class="card-face card-back">
          <div class="back-title">${k.nome}</div>
          <div class="back-row"><div class="back-label">Descrizione</div><div class="back-val">${k.desc}</div></div>
          <div class="back-row"><div class="back-label">Formula / Calcolo</div><div class="back-val">${k.formula}</div></div>
          <div class="back-row"><div class="back-label">Unità di misura</div><div class="back-val">${k.unita}</div></div>
          <div class="back-row"><div class="back-label">Frequenza</div><div class="back-val">${k.frequenza}</div></div>
          <div class="back-row"><div class="back-label">Fonte del dato</div><div class="back-val">${k.fonte}</div></div>
          <div class="targets">
            <div class="target-box"><div class="t-label">Target Anno 1</div><div class="t-val">${k.target1}</div></div>
            <div class="target-box"><div class="t-label">Target Anno 3</div><div class="t-val">${k.target3}</div></div>
          </div>
        </div>
      </div>`;
    grid.insertBefore(wrap,empty);
  });
  document.getElementById('shownCount').textContent=data.length;
}

function applyFilters(){
  const q=document.getElementById('searchInput').value.toLowerCase();
  const filtered=KPI_DATA.filter(k=>{
    const matchCompany=activeCompany==='all'||k.company===activeCompany;
    const matchArea=activeArea==='all'||k.area===activeArea;
    const matchSearch=!q||(k.nome+' '+k.desc+' '+k.finalitaDesc).toLowerCase().includes(q);
    return matchCompany&&matchArea&&matchSearch;
  });
  buildCards(filtered);
}

function setCompany(btn,val){
  activeCompany=val;
  document.querySelectorAll('#companyFilters .btn-filter').forEach(b=>{
    b.classList.remove('active','active-nxs','active-oltre');
  });
  if(val==='all') btn.classList.add('active');
  else if(val==='NXS') btn.classList.add('active-nxs');
  else btn.classList.add('active-oltre');
  applyFilters();
}

function setArea(btn,val){
  activeArea=val;
  document.querySelectorAll('#areaFilters .btn-filter').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  applyFilters();
}

function shuffleCards(){
  KPI_DATA.sort(()=>Math.random()-.5);
  applyFilters();
}

// Init
document.getElementById('totalCount').textContent=KPI_DATA.length;
buildCards(KPI_DATA);
document.getElementById('shownCount').textContent=KPI_DATA.length;

document.addEventListener('keydown',e=>{
  const cards=Array.from(document.querySelectorAll('.card-wrap:not(.hidden)'));
  const flipped=cards.findIndex(c=>c.classList.contains('flipped'));
  if(e.key===' '&&flipped>=0){e.preventDefault();cards[flipped].classList.toggle('flipped');}
  if(e.key==='ArrowRight'&&flipped>=0&&flipped<cards.length-1){cards[flipped].classList.remove('flipped');cards[flipped+1].classList.add('flipped');cards[flipped+1].scrollIntoView({behavior:'smooth',block:'center'});}
  if(e.key==='ArrowLeft'&&flipped>0){cards[flipped].classList.remove('flipped');cards[flipped-1].classList.add('flipped');cards[flipped-1].scrollIntoView({behavior:'smooth',block:'center'});}
});
</script>
</body>
</html>
